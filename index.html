<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grupo do Cinema</title>
    <link rel="stylesheet" href="./style.css?v=5" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">🎬</div>
          <div>
            <p class="eyebrow">CLUBE</p>
            <h1>Grupo do Cinema</h1>
            <p class="muted">@GdC</p>
          </div>
        </div>

        <div class="nav-buttons">
          <button id="filmsTabBtn" class="menu-btn active" type="button">Filmes</button>
          <button id="tierlistTabBtn" class="menu-btn" type="button">Tier List</button>
        </div>

        <div class="sidebar-box">
          <p class="sidebar-title">Resumo</p>
          <div class="stats">
            <div class="stat">
              <span id="statTotal">0</span>
              <small>Total</small>
            </div>
            <div class="stat">
              <span id="statWatched">0</span>
              <small>Vimos</small>
            </div>
            <div class="stat">
              <span id="statNotWatched">0</span>
              <small>Não vimos</small>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <section id="filmsPage" class="page">
          <header class="top-header card">
            <div>
              <p class="eyebrow">COLEÇÃO</p>
              <h2>Filmes</h2>
            </div>

            <button id="openAddMovieBtn" class="gold-btn" type="button">
              + Adicionar filme
            </button>
          </header>

          <section class="toolbar card">
            <input
              id="searchInput"
              type="text"
              placeholder="Buscar filme pelo nome..."
              class="search-input"
            />
          </section>

          <section class="section-block">
            <div class="section-head">
              <h3>Vimos</h3>
            </div>
            <div id="watchedGrid" class="movies-grid"></div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h3>Ainda não vimos</h3>
            </div>
            <div id="toWatchGrid" class="movies-grid"></div>
          </section>
        </section>

        <section id="tierlistPage" class="page hidden">
          <header class="top-header card">
            <div>
              <p class="eyebrow">RANKING</p>
              <h2>Tier List</h2>
            </div>
          </header>

          <section class="section-block">
            <div class="tierlist-board">
              <div class="tier-row">
                <div class="tier-label tier-s">S</div>
                <div
                  class="tier-dropzone"
                  data-tier="S"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                  ondrop="handleDropToTier(event)"
                ></div>
              </div>

              <div class="tier-row">
                <div class="tier-label tier-a">A</div>
                <div
                  class="tier-dropzone"
                  data-tier="A"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                  ondrop="handleDropToTier(event)"
                ></div>
              </div>

              <div class="tier-row">
                <div class="tier-label tier-b">B</div>
                <div
                  class="tier-dropzone"
                  data-tier="B"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                  ondrop="handleDropToTier(event)"
                ></div>
              </div>

              <div class="tier-row">
                <div class="tier-label tier-c">C</div>
                <div
                  class="tier-dropzone"
                  data-tier="C"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                  ondrop="handleDropToTier(event)"
                ></div>
              </div>

              <div class="tier-row">
                <div class="tier-label tier-d">D</div>
                <div
                  class="tier-dropzone"
                  data-tier="D"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                  ondrop="handleDropToTier(event)"
                ></div>
              </div>

              <div class="tier-row">
                <div class="tier-label tier-f">F</div>
                <div
                  class="tier-dropzone"
                  data-tier="F"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                  ondrop="handleDropToTier(event)"
                ></div>
              </div>
            </div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h3>Sem rank</h3>
            </div>
            <div
              id="unrankedPool"
              class="tier-pool"
              ondragover="handleDragOver(event)"
              ondragleave="handleDragLeave(event)"
              ondrop="handleDropToPool(event)"
            ></div>
          </section>
        </section>
      </main>
    </div>

    <div id="addMovieModal" class="modal hidden">
      <div class="modal-panel card">
        <button id="closeAddMovieModal" class="modal-close" type="button">×</button>
        <h3 class="modal-title">Adicionar filme</h3>

        <form id="movieForm" class="form">
          <div class="api-row">
            <input
              id="apiMovieTitle"
              type="text"
              placeholder="Buscar filme no TMDb"
            />
            <button id="searchApiBtn" class="gold-btn" type="button">Buscar</button>
          </div>

          <input id="movieTitle" type="text" placeholder="Título" required />

          <div class="form-row">
            <input id="movieYear" type="text" placeholder="Ano" />
            <input id="moviePoster" type="text" placeholder="URL do pôster" />
          </div>

          <textarea
            id="movieDescription"
            placeholder="Descrição do filme"
          ></textarea>

          <button class="gold-btn submit-btn" type="submit">Salvar filme</button>
        </form>
      </div>
    </div>

    <div id="movieDetailsModal" class="modal hidden">
      <div class="modal-panel details-panel card">
        <button id="closeMovieDetailsModal" class="modal-close" type="button">×</button>
        <div id="movieDetailsContent"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app.js?v=6"></script>
  </body>
</html>
